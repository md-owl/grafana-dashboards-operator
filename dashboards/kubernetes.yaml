apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: k8s-dashboard
  namespace: monitoring
  labels:
    app: grafana
spec:
  folder: infrastructure
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  resyncPeriod: 1m
  configMapRef:
    name: dashboards
    key: kubernetes.json