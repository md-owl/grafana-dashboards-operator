apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: loki-dashboard
  namespace: monitoring
  labels:
    app: grafana
spec:
  folder: logs
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  resyncPeriod: 1m
  configMapRef:
    name: dashboards
    key: loki.json