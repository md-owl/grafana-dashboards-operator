apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: k8s-dashboard-pub
  namespace: monitoring
  labels:
    app: grafana-pub
spec:
  folder: infrastructure
  instanceSelector:
    matchLabels:
      dashboards: "grafana-pub"
  resyncPeriod: 1m
  configMapRef:
    name: dashboards
    key: kubernetes.json